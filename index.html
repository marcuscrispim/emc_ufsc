<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disciplinas de Engenharia Mecânica</title>
    <link rel="stylesheet" href="static/styles.css">
    <script src="static/scripts.js" defer></script>
</head>
<body>
    <header>
        <div class="header-content">
            <img src="static/image.png" alt="UFSC">
            <div>
                <p class="eyebrow">Engenharia Mecânica</p>
                <h1>Mapa de disciplinas</h1>
            </div>
        </div>
    </header>
    <main>
        <section class="toolbar" aria-label="Resumo do curso">
            <div class="progress-panel">
                <span id="progress-label">0 de 0 concluídas</span>
                <div class="progress-track" aria-hidden="true">
                    <span id="progress-bar"></span>
                </div>
            </div>
            <div id="legenda" aria-label="Legenda">
                <span><i class="legend-item done"></i> Concluída</span>
                <span><i class="legend-item available"></i> Liberada</span>
                <span><i class="legend-item locked"></i> Bloqueada</span>
            </div>
            <button id="reset-button" type="button">Limpar seleção</button>
        </section>

        <section id="disciplinas-container" aria-live="polite"></section>
    </main>
</body>
</html>
